name: Portfolio Build Image

on:
  push:
    tags:
      - "portfolio-v*"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/minhquy1805/minhquy-portfolio

jobs:
  build-portfolio-image:
    name: Build Portfolio Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Validate portfolio tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" != portfolio-v* ]]; then
            echo "Invalid tag for portfolio build: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push portfolio image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.IMAGE_NAME }}:sha-${{ github.sha }}